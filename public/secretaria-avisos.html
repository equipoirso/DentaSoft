<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <title>DentaSoft · Secretaría – Avisos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="./styles.css"/>

  <!-- Firebase SDKs (compat) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.4/firebase-functions-compat.js"></script>

  <!-- Inicialización propia de Firebase -->
  <script defer src="./common.js"></script>

  <style>
    /* Estilos mínimos para que se vea como la captura */
    body{
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      margin:0; background:#f3f6fb; color:#1f2937;
    }
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 16px; background:#ffffff; box-shadow:0 1px 0 rgba(0,0,0,.06);
    }
    .logo{ font-weight:800; letter-spacing:.5px; }
    .logo span{ margin-left:6px }
    .container{ max-width:980px; margin:20px auto; padding:0 16px; }
    .card{
      background:#fff; border:2px solid #1e6aa6;
      border-radius:14px; padding:20px;
      box-shadow:0 10px 24px rgba(30,106,166,.12);
    }
    .headline-lg{ font-size:20px; font-weight:800; color:#123b62; margin:0 0 4px }
    .muted{ color:#6b7280 }
    form{ display:grid; gap:12px; }
    .grid-2{ display:grid; gap:12px; grid-template-columns:repeat(2,minmax(0,1fr)); }
    .grid-dni{ display:grid; gap:12px; grid-template-columns: 1fr auto; align-items:end; }
    label{ display:grid; gap:6px; font-size:14px; color:#374151 }
    input{
      border:2px solid #d1e3f5; border-radius:10px; padding:12px 14px; font-size:15px; outline:none;
      background:#fff;
    }
    input:focus{ border-color:#1e6aa6; box-shadow:0 0 0 4px rgba(30,106,166,.12) }
    .btn{
      background:#0b63ce; color:#fff; border:none; padding:12px 16px;
      border-radius:10px; font-weight:800; cursor:pointer; letter-spacing:.2px;
    }
    .btn:hover{ background:#0a59b8 }
    .btn.light{ background:#eaf2ff; color:#0b63ce; }
    .btn.light:hover{ background:#dbe8ff; }
    .backlink{ text-decoration:none; color:#0b63ce; font-weight:700 }
    footer{ text-align:center; padding:16px; color:#94a3b8 }
    .error{ color:#b91c1c }
    .ok{ color:#0f766e }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo">🦷 <span>DENTASOFT</span></div>
    <nav><a class="backlink" href="./secretaria.html">ATRÁS</a></nav>
  </header>

  <main class="container">
    <div class="card" style="max-width:720px; margin:0 auto">
      <h2 class="headline-lg">Enviar recordatorio rápido</h2>
      <p class="muted">Usá este formulario para enviar un recordatorio puntual por email (usa SendGrid vía Cloud Functions).</p>

      <form id="mailForm">
        <!-- NUEVO: DNI + Buscar en Firestore -->
        <div class="grid-dni">
          <label>DNI (8 dígitos)
            <input type="text" id="dni" inputmode="numeric" maxlength="8" pattern="[0-9]{8}" placeholder="12345678">
          </label>
          <button type="button" id="btnBuscar" class="btn light">Buscar</button>
        </div>
        <small id="dniStatus" class="muted"></small>

        <label>Email del paciente
          <input type="email" id="to" required placeholder="paciente@correo.com" />
        </label>

        <div class="grid-2">
          <label>Fecha (texto)
            <input type="text" id="fecha" placeholder="lunes 23/09" />
          </label>
          <label>Hora (texto)
            <input type="text" id="hora" placeholder="10:30" />
          </label>
        </div>

        <label>Asunto
          <input type="text" id="asunto" value="Recordatorio de turno - DentaSoft" />
        </label>

        <button type="submit" class="btn">Enviar recordatorio</button>
        <small id="estado" class="muted"></small>
      </form>
    </div>
  </main>

  <footer>© DentaSoft</footer>

  <!-- JS de esta página -->
  <script defer src="./secretaria-avisos.js"></script>
</body>
</html>
